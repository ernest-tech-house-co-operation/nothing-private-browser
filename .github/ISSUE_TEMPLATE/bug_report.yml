name: 🐛 Bug Report
description: Report a bug in Nothing Browser, Nothing Private Browser, or Piggy
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Before submitting, please:
        - Check if the issue already exists
        - Update to the latest version
        - For security issues, email ernesttechhouse@gmail.com instead

  - type: dropdown
    id: product
    attributes:
      label: Product
      description: Which product has the bug?
      options:
        - Nothing Browser (UI)
        - Nothing Private Browser
        - Piggy (Library)
        - Documentation
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: What version are you using?
      placeholder: e.g., v0.1.3
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Linux (x86_64)
        - Linux (ARM64)
        - Windows
        - macOS
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: What happened? What did you expect to happen?
      placeholder: |
        When I click X, Y happens instead of Z...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this bug?
      placeholder: |
        1. Launch browser with...
        2. Navigate to...
        3. Click...
        4. See error
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Terminal Output
      description: Paste any relevant error messages or logs
      render: shell

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Screenshots, videos, or anything else that might help

  - type: checkboxes
    id: verification
    attributes:
      label: Verification
      description: Please confirm the following
      options:
        - label: I have updated to the latest version
          required: true
        - label: I have searched for existing issues
          required: true
        - label: This is not a security issue (if it is, I'll email instead)
          required: true